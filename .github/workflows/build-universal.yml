name: Build Universal Packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_LTO: true
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

jobs:
  build-linux:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-x86_64-unknown-linux-gnu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-x86_64-unknown-linux-gnu-cargo-

      - name: Build native binaries
        run: |
          cargo build --release \
            --target x86_64-unknown-linux-gnu \
            -p oxidecode-node \
            -p oxidecode-jvm

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp "target/x86_64-unknown-linux-gnu/release/liboxidecode_node.so" "artifacts/oxidecode.linux-x64.node"
          cp "target/x86_64-unknown-linux-gnu/release/liboxidecode_jvm.so" "artifacts/oxidecode_jvm.linux.so"

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-x86_64-unknown-linux-gnu
          path: artifacts/*
          retention-days: 1

  build-macos:
    runs-on: blacksmith-6vcpu-macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: macos-universal-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-universal-cargo-

      - name: Build arm64 binaries
        run: |
          cargo build --release \
            --target aarch64-apple-darwin \
            -p oxidecode-node \
            -p oxidecode-jvm

      - name: Build x64 binaries
        run: |
          cargo build --release \
            --target x86_64-apple-darwin \
            -p oxidecode-node \
            -p oxidecode-jvm

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp "target/aarch64-apple-darwin/release/liboxidecode_node.dylib" "artifacts/oxidecode.darwin-arm64.node"
          cp "target/aarch64-apple-darwin/release/liboxidecode_jvm.dylib" "artifacts/oxidecode_jvm.darwin-arm64.dylib"
          cp "target/x86_64-apple-darwin/release/liboxidecode_node.dylib" "artifacts/oxidecode.darwin-x64.node"
          cp "target/x86_64-apple-darwin/release/liboxidecode_jvm.dylib" "artifacts/oxidecode_jvm.darwin-x64.dylib"

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: artifacts/*
          retention-days: 1

  build-windows:
    runs-on: blacksmith-2vcpu-windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\index
            ~\.cargo\registry\cache
            ~\.cargo\git\db
            target
          key: windows-x86_64-pc-windows-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-x86_64-pc-windows-msvc-cargo-

      - name: Build native binaries
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p oxidecode-node -p oxidecode-jvm

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/oxidecode_node.dll" "artifacts/oxidecode.win32-x64.node"
          Copy-Item "target/x86_64-pc-windows-msvc/release/oxidecode_jvm.dll" "artifacts/oxidecode_jvm.win32.dll"

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-x86_64-pc-windows-msvc
          path: artifacts/*
          retention-days: 1

  package-vscode:
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Download all node modules
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: temp-artifacts
          merge-multiple: true

      - name: Move node modules to extension directory
        run: |
          mkdir -p vscode-extension
          mv temp-artifacts/*.node vscode-extension/

      - name: Verify node modules
        working-directory: vscode-extension
        run: ls -la oxidecode.*.node

      - name: Install dependencies
        working-directory: vscode-extension
        run: bun install --frozen-lockfile

      - name: Build extension JS
        working-directory: vscode-extension
        run: bun run build

      - name: Package VSIX
        working-directory: vscode-extension
        run: bunx @vscode/vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: oxidecode-vscode-extension
          path: vscode-extension/*.vsix
          retention-days: 30

  package-intellij:
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4

      - name: Download all JVM native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: temp-artifacts
          merge-multiple: true

      - name: Place native libs into resources
        run: |
          mkdir -p intellij-plugin-v2/src/main/resources/native
          cp temp-artifacts/oxidecode_jvm.linux.so intellij-plugin-v2/src/main/resources/native/oxidecode_jvm_x64.so
          cp temp-artifacts/oxidecode_jvm.darwin-arm64.dylib intellij-plugin-v2/src/main/resources/native/oxidecode_jvm_arm64.dylib
          cp temp-artifacts/oxidecode_jvm.darwin-x64.dylib intellij-plugin-v2/src/main/resources/native/oxidecode_jvm_x64.dylib
          cp temp-artifacts/oxidecode_jvm.win32.dll intellij-plugin-v2/src/main/resources/native/oxidecode_jvm_x64.dll

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        working-directory: intellij-plugin-v2
        run: chmod +x gradlew

      - name: Build IntelliJ plugin
        working-directory: intellij-plugin-v2
        run: ./gradlew clean buildPlugin -PskipNativeCopy --no-daemon --parallel

      - name: Upload IntelliJ plugin
        uses: actions/upload-artifact@v4
        with:
          name: oxidecode-intellij-plugin
          path: intellij-plugin-v2/build/distributions/*.zip
          retention-days: 14
